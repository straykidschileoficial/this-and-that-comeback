<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>QR Spotify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body {
    margin: 0;
    background: #121212;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Circular', 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
  }
  .card {
    background: #282828;
    border-radius: 16px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  #qrcode canvas, #qrcode img {
    border-radius: 8px;
    display: block;
  }
  .spotify-logo {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #1DB954;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .spotify-logo svg { width: 28px; height: 28px; }
  .label {
    color: #b3b3b3;
    font-size: 13px;
    text-align: center;
    max-width: 220px;
    line-height: 1.5;
  }
  button {
    background: #1DB954;
    color: #000;
    border: none;
    border-radius: 500px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s;
  }
  button:hover { background: #1ed760; }
</style>
</head>
<body>
<div class="card">
  <div class="spotify-logo">
    <svg viewBox="0 0 24 24" fill="#1DB954" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.51 17.31a.748.748 0 01-1.03.25c-2.818-1.72-6.365-2.11-10.542-1.157a.748.748 0 01-.892-.564.748.748 0 01.564-.892c4.571-1.045 8.492-.594 11.65 1.334a.748.748 0 01.25 1.03zm1.47-3.27a.937.937 0 01-1.288.308c-3.225-1.983-8.144-2.558-11.963-1.4a.937.937 0 01-.578-1.787c4.36-1.403 9.78-.724 13.521 1.592a.937.937 0 01.308 1.287zm.127-3.403c-3.867-2.296-10.244-2.508-13.934-1.388a1.124 1.124 0 01-.693-2.144c4.237-1.368 11.282-1.103 15.73 1.607a1.124 1.124 0 01-1.103 1.925z"/>
    </svg>
    Spotify
  </div>
  <div id="qrcode"></div>
  <p class="label">Escanea para abrir el álbum en Spotify</p>
  <button onclick="descargarJPG()">⬇ Descargar JPG</button>
</div>

<script>
const URL = "https://open.spotify.com/intl-es/album/46TYlDjLrEsOLFgxfxNiUy?si=ec844736adde43d0";

new QRCode(document.getElementById("qrcode"), {
  text: URL,
  width: 240,
  height: 240,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});

function descargarJPG() {
  const canvas = document.querySelector("#qrcode canvas");
  if (!canvas) { alert("Espera un momento y vuelve a intentarlo."); return; }

  // Crear canvas con padding y branding
  const out = document.createElement("canvas");
  const pad = 40;
  out.width  = canvas.width  + pad * 2;
  out.height = canvas.height + pad * 2 + 50;
  const ctx = out.getContext("2d");

  // Fondo blanco
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, out.width, out.height);

  // QR centrado
  ctx.drawImage(canvas, pad, pad);

  // Texto inferior
  ctx.fillStyle = "#1DB954";
  ctx.font = "bold 16px Arial";
  ctx.textAlign = "center";
  ctx.fillText("Spotify", out.width / 2, canvas.height + pad + 32);

  const link = document.createElement("a");
  link.download = "spotify_qr.jpg";
  link.href = out.toDataURL("image/jpeg", 0.97);
  link.click();
}
</script>
</body>
</html>
